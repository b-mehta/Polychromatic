name = "polychromatic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Polychromatic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false # no "assume a typo is a new variable"
relaxedAutoImplicit = false # no "assume a typo is a new variable"
linter.style.longLine = true # no lines longer than 100 chars
linter.style.multiGoal = true # no multiple active goals
weak.linter.mathlibStandardSet = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "Polychromatic"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso"
rev = "no-modules/ce893b9042128037e2d3c0158b9567fab9fae268"